/* ───────────────── PRIMITIVES ───────────────── */
function GlassCard({ t, children, style = {}, padding = 16 }) {
  return (
    <div style={{
      position: 'relative', borderRadius: 22, padding,

      backdropFilter: 'blur(28px) saturate(180%)',

      border: `0.5px solid ${t.glassBorder}`,
      boxShadow: `${t.cardShadow}, ${t.glassInset}`,
      ...style,
    }}>{children}</div>
  );
}

function Pill({ t, children, tone = 'neutral', style = {} }) {
  const tones = {
    neutral:  { bg: t.chipBg, fg: t.textSec, bd: t.chipBorder },
    approved: { bg: 'rgba(94,160,108,0.18)', fg: '#5EA06C', bd: 'rgba(94,160,108,0.30)' },
    pending:  { bg: 'rgba(220,160,80,0.18)', fg: '#DCA050', bd: 'rgba(220,160,80,0.30)' },
    rejected: { bg: 'rgba(214,108,108,0.18)', fg: '#D66C6C', bd: 'rgba(214,108,108,0.30)' },
    accent:   { bg: 'rgba(168,176,196,0.20)', fg: t.text,    bd: 'rgba(168,176,196,0.35)' },
  };
  const c = tones[tone];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: '3px 9px', borderRadius: 999,
      background: c.bg, color: c.fg,
      border: `0.5px solid ${c.bd}`,
      fontSize: 11, fontWeight: 600, letterSpacing: '-0.01em',
      ...style,
    }}>{children}</span>
  );
}

function Avatar({ color = '#878E9F', size = 36, label = '' }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: 999,
      background: `linear-gradient(135deg, ${color} 0%, ${color}CC 100%)`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      color: '#fff', fontSize: size * 0.36, fontWeight: 600,
      boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.25)', flexShrink: 0,
    }}>{label}</div>
  );
}

function Sparkline({ data, w = 280, h = 60, color = '#A8B0C4' }) {
  const max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / (max - min || 1)) * (h - 8) - 4;
    return [x, y];
  });
  const path = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0]},${p[1]}`).join(' ');
  const area = `${path} L${w},${h} L0,${h} Z`;
  return (
    <svg width={w} height={h} style={{ display: 'block' }}>
      <defs>
        <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#spark)" />
      <path d={path} stroke={color} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function Donut({ segments, size = 132, thickness = 18 }) {
  const r = (size - thickness) / 2;
  const c = 2 * Math.PI * r;
  const total = segments.reduce((s, x) => s + x.value, 0);
  let off = 0;
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      {segments.map((s, i) => {
        const len = (s.value / total) * c;
        const dash = `${len} ${c - len}`;
        const el = <circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={thickness} strokeDasharray={dash} strokeDashoffset={-off} />;
        off += len;
        return el;
      })}
    </svg>
  );
}

function Bars({ data, t, h = 100 }) {
  const max = Math.max(...data.map(d => d.value));
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 8, height: h }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
          <div style={{
            width: '100%', height: `${(d.value / max) * (h - 18)}px`,
            background: `linear-gradient(180deg, ${t.accent} 0%, ${t.accent}99 100%)`,
            borderRadius: 6, minHeight: 4,
          }}/>
          <div style={{ fontSize: 9.5, color: t.textMuted, fontWeight: 500 }}>{d.label}</div>
        </div>
      ))}
    </div>
  );
}

/* ───────────────── PHONE APP SHELL ───────────────── */
function PhoneApp({ t, role, company, onSwitchCompany }) {
  const [tab, setTab] = useState('home');
  const [stack, setStack] = useState([]);
  const [scrollY, setScrollY] = useState(0);
  const scrollRef = useRef(null);

  const employeeTabs = [
    { id: 'home',     icon: 'home',  label: 'Home' },
    { id: 'dashboard',icon: 'chart', label: 'Dashboard' },
    { id: 'add',      icon: 'plus',  label: '', center: true },
    { id: 'activity', icon: 'list',  label: 'Activity' },
    { id: 'profile',  icon: 'user',  label: 'You' },
  ];
  const managerTabs = [
    { id: 'home',     icon: 'home',  label: 'Overview' },
    { id: 'dashboard',icon: 'chart', label: 'Dashboard' },
    { id: 'add',      icon: 'plus',  label: '', center: true },
    { id: 'review',   icon: 'inbox', label: 'Review' },
    { id: 'profile',  icon: 'user',  label: 'You' },
  ];
  const tabs = role === 'manager' ? managerTabs : employeeTabs;

  useEffect(() => { setStack([]); setTab('home'); }, [role]);

  const onScroll = (e) => setScrollY(e.target.scrollTop);
  const headerOpacity = Math.min(scrollY / 40, 1);
  const top = stack[stack.length - 1];

  const goTo = (route) => setStack([...stack, route]);
  const back = () => setStack(stack.slice(0, -1));
  const open = (e) => goTo({ type: 'detail', expense: e });

  const renderScreen = () => {
    if (top?.type === 'detail') return <DetailScreen t={t} expense={top.expense} role={role} onBack={back} onAction={back}/>;
    if (top?.type === 'manageProjects') return <ManageProjectsScreen t={t} onBack={back}/>;
    if (top?.type === 'permissions') return <PermissionsScreen t={t} onBack={back}/>;
    if (tab === 'add') return <SubmitScreen t={t} onClose={() => setTab('home')} onSubmit={() => setTab('activity')}/>;
    if (tab === 'home' && role === 'manager') return <ManagerOverviewScreen t={t} onTab={setTab}/>;
    if (tab === 'home') return <HomeScreen t={t} role={role} company={company} onOpen={open} onTab={setTab}/>;
    if (tab === 'dashboard') return <DashboardScreen t={t}/>;
    if (tab === 'activity') return <ActivityScreen t={t} onOpen={open}/>;
    if (tab === 'review') return <ReviewScreen t={t} onOpen={open}/>;
    if (tab === 'profile') return <ProfileScreen t={t} role={role} onNav={(r) => goTo({ type: r })}/>;
    return null;
  };

  return (
    <div style={{
      width: '100%', height: '100%', position: 'relative',
      background: t.bg, overflow: 'hidden', color: t.text,
    }}>
      {/* decorative blobs behind glass */}
      <div style={{ position: 'absolute', top: -60, right: -40, width: 280, height: 280, borderRadius: 999, background: t.blob1, filter: 'blur(60px)', pointerEvents: 'none' }}/>
      <div style={{ position: 'absolute', bottom: 100, left: -60, width: 240, height: 240, borderRadius: 999, background: t.blob2, filter: 'blur(60px)', pointerEvents: 'none' }}/>

      {/* Top bar (overlay, scroll-aware glass) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 25, paddingTop: 47 }}>
        <div style={{
          position: 'absolute', inset: 0,
          background: t.glassBg, opacity: headerOpacity,
          backdropFilter: `blur(${22 * headerOpacity}px) saturate(180%)`,
          WebkitBackdropFilter: `blur(${22 * headerOpacity}px) saturate(180%)`,
          borderBottom: `0.5px solid ${t.glassBorder}`, transition: 'opacity 0.15s',
        }}/>
        <div style={{ position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 14px', height: 50 }}>
          <button onClick={() => {
            const idx = COMPANIES.findIndex(c => c.id === company.id);
            onSwitchCompany(COMPANIES[(idx + 1) % COMPANIES.length]);
          }} style={{
            display: 'flex', alignItems: 'center', gap: 8, padding: '6px 12px 6px 6px',
            borderRadius: 999, border: `0.5px solid ${t.glassBorder}`,
            background: t.glassBg, backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)',
            cursor: 'pointer', fontFamily: 'inherit',
          }}>
            <div style={{ width: 26, height: 26, borderRadius: 7, background: company.color, color: '#fff', fontSize: 9, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{company.abbr}</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: t.text }}>{company.name}</div>
            <Icon name="chevron" size={13} color={t.textMuted}/>
          </button>
          <button style={{
            width: 38, height: 38, borderRadius: 999,
            border: `0.5px solid ${t.glassBorder}`, background: t.glassBg,
            backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
            position: 'relative',
          }}>
            <Icon name="bell" size={17} color={t.text} stroke={1.8}/>
            <div style={{ position: 'absolute', top: 8, right: 9, width: 8, height: 8, borderRadius: 999, background: '#D66C6C', border: '1.5px solid #fff' }}/>
          </button>
        </div>
      </div>

      {/* Scrollable content */}
      <div ref={scrollRef} onScroll={onScroll} style={{
        position: 'absolute', inset: 0, overflowY: 'auto', paddingTop: 100,
      }}>
        {renderScreen()}
      </div>

      {/* Bottom tab bar — iOS 26 liquid glass */}
      {!top && tab !== 'add' && (
        <div style={{
          position: 'absolute', left: 16, right: 16, bottom: 28, zIndex: 40,
          height: 64, borderRadius: 32, overflow: 'hidden',
          boxShadow: '0 16px 40px rgba(0,0,0,0.18), 0 4px 12px rgba(0,0,0,0.08)',
        }}>
          <div style={{
            position: 'absolute', inset: 0, borderRadius: 32,
            backdropFilter: 'blur(28px) saturate(190%)',
            WebkitBackdropFilter: 'blur(28px) saturate(190%)',
            background: t.name === 'dark' ? 'rgba(28,30,40,0.55)' : 'rgba(255,255,255,0.55)',
          }}/>
          <div style={{
            position: 'absolute', inset: 0, borderRadius: 32,
            boxShadow: t.name === 'dark'
              ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.18), inset -1px -1px 1px rgba(255,255,255,0.05), inset 0 0 0 0.5px rgba(255,255,255,0.10)'
              : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.85), inset -1px -1px 1px rgba(255,255,255,0.4), inset 0 0 0 0.5px rgba(0,0,0,0.05)',
            pointerEvents: 'none',
          }}/>
          <div style={{
            position: 'absolute', top: 0, left: 0, right: 0, height: '50%', borderRadius: '32px 32px 0 0',
            background: t.name === 'dark'
              ? 'linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0) 100%)'
              : 'linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 100%)',
            pointerEvents: 'none',
          }}/>
          <div style={{ position: 'relative', height: '100%', display: 'flex', alignItems: 'center', padding: '0 8px' }}>
            {tabs.map(tb => {
              const active = tab === tb.id;
              if (tb.center) {
                return (
                  <button key={tb.id} onClick={() => setTab('add')} style={{
                    flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
                    background: 'transparent', border: 'none', cursor: 'pointer', height: '100%',
                  }}>
                    <div style={{
                      width: 44, height: 44, borderRadius: 14,
                      background: t.accent, color: t.accentText,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.4), inset 0 -1px 0 rgba(0,0,0,0.12), 0 4px 14px rgba(0,0,0,0.18)',
                    }}>
                      <Icon name="plus" size={22} stroke={2.4}/>
                    </div>
                  </button>
                );
              }
              return (
                <button key={tb.id} onClick={() => setTab(tb.id)} style={{
                  flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center',
                  justifyContent: 'center', gap: 3, height: '100%',
                  background: 'transparent', border: 'none', cursor: 'pointer', position: 'relative',
                }}>
                  {active && <div style={{ position: 'absolute', top: 8, width: 4, height: 4, borderRadius: 999, background: t.accent, boxShadow: `0 0 8px ${t.accent}` }}/>}
                  <Icon name={tb.icon} size={21} color={active ? t.text : t.textMuted} stroke={active ? 2 : 1.8}/>
                  <div style={{ fontSize: 9.5, fontWeight: 600, color: active ? t.text : t.textMuted, letterSpacing: '-0.01em' }}>{tb.label}</div>
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

        </ControlGroup>

        <ControlGroup label="Appearance">
          <Segmented value={theme} options={[{ id: 'light', label: '☀ Light' }, { id: 'dark', label: '☾ Dark' }]} onChange={setTheme}/>
        </ControlGroup>

        <ControlGroup label="Workspace">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {COMPANIES.map(c => (
              <button key={c.id} onClick={() => setCompany(c)} style={{
                display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', borderRadius: 12,
                background: company.id === c.id ? 'rgba(255,255,255,0.10)' : 'rgba(255,255,255,0.04)',
                border: `0.5px solid ${company.id === c.id ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.07)'}`,
                color: '#E8EAF0', cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left',
              }}>
                <div style={{ width: 24, height: 24, borderRadius: 7, background: c.color, color: '#fff', fontSize: 9, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{c.abbr}</div>
                <span style={{ fontSize: 13, fontWeight: 500, flex: 1 }}>{c.name}</span>
                {company.id === c.id && <span style={{ width: 6, height: 6, borderRadius: 99, background: '#A8B0C4' }}/>}
              </button>
            ))}
          </div>
        </ControlGroup>

        <div style={{ fontSize: 11, color: 'rgba(232,234,240,0.4)', lineHeight: 1.6, padding: '12px 14px', background: 'rgba(255,255,255,0.03)', borderRadius: 12, border: '0.5px solid rgba(255,255,255,0.06)' }}>
          <strong style={{ color: 'rgba(232,234,240,0.7)', fontWeight: 600 }}>Try:</strong> tap "+" to scan a receipt · open any expense · switch to Manager to see Review queue · Manager → You → Workspace admin
        </div>
      </div>

      <div className="phone-wrap">
        <div className="phone-inner">
          <IOSDevice width={390} height={844} dark={t.statusBarDark}>
            <PhoneApp t={t} role={role} company={company} onSwitchCompany={setCompany}/>
          </IOSDevice>
        </div>
      </div>
    </div>
  );
}

function ControlGroup({ label, children }) {
  return (
    <div>
      <div style={{ fontSize: 11, fontWeight: 600, color: 'rgba(232,234,240,0.5)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8 }}>{label}</div>
      {children}
    </div>
  );
}

function Segmented({ value, options, onChange }) {
  return (
    <div style={{ display: 'flex', padding: 3, borderRadius: 11, background: 'rgba(255,255,255,0.06)', border: '0.5px solid rgba(255,255,255,0.08)' }}>
      {options.map(o => {
        const active = value === o.id;
        return (
          <button key={o.id} onClick={() => onChange(o.id)} style={{
            flex: 1, padding: '7px 10px', border: 'none', cursor: 'pointer', fontFamily: 'inherit',
            background: active ? 'rgba(255,255,255,0.12)' : 'transparent',
            color: active ? '#fff' : 'rgba(232,234,240,0.55)', borderRadius: 8,
            fontSize: 12, fontWeight: 600, transition: 'all 0.15s',
            boxShadow: active ? '0 1px 3px rgba(0,0,0,0.18), inset 0 0 0 0.5px rgba(255,255,255,0.1)' : 'none',
          }}>{o.label}</button>
        );
      })}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Stage/>);
  </script>
</body>
</html>
